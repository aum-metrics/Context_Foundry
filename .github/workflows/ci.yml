name: CI — Lint & Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx next lint

  backend-syntax:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all .py files
        run: find backend/app -name '*.py' -exec python -c "import py_compile, sys; py_compile.compile(sys.argv[1], doraise=True)" {} \;
      - name: Smoke test (import check)
        working-directory: backend
        run: python test_main.py
