name: CI — Lint, Test & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx next lint

  frontend-build:
    name: Frontend Build (Production)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock-key-to-prevent-crash"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock-project-id"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  e2e-tests:
    name: End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Build Next.js App for E2E
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock-key-to-prevent-crash"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock-project-id"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
      - name: Run Playwright tests
        run: npx playwright test

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check (all .py files)
        run: find app -name '*.py' -exec python -c "import py_compile, sys; py_compile.compile(sys.argv[1], doraise=True)" {} \;
      - name: Smoke test (import check)
        run: python test_main.py
        env:
          ENV: "testing"
          JWT_SECRET: "ci-test-secret-key"
          SSO_ENCRYPTION_KEY: "ci-sso-encryption-key-fallback"
          SSO_JWT_SECRET: "ci-sso-jwt-secret-key-fallback"
      - name: Run pytest suite
        working-directory: backend
        run: python -m pytest tests/ -q --tb=short
        env:
          ENV: "testing"
          JWT_SECRET: "ci-test-secret-key"
          SSO_ENCRYPTION_KEY: "ci-sso-encryption-key-fallback"
          SSO_JWT_SECRET: "ci-sso-jwt-secret-key-fallback"
